---
name: Website Preview
on:
  pull_request_target:
    types:
      # not for "labeled" to prevent two builds for "labeled" and "unlabeled" when labels are changed
      - unlabeled # if GitHub Actions stuck, add and remove "not ready" label to force rebuild
      - opened
      - reopened
      - synchronize

# Do not run this workflow in parallel for any PR change
# to prevent concurrent pushes for the same Cloudflare domain alias.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  GOPATH: /home/runner/go
  GOCACHE: /home/runner/go/cache
  GOLANGCI_LINT_CACHE: /home/runner/go/cache/lint
  GOMODCACHE: /home/runner/go/mod
  GOPROXY: https://proxy.golang.org
  GOTOOLCHAIN: local

jobs:
  blog-preview:
    name: Preview blog
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    if: >
      contains(github.event.pull_request.labels.*.name, 'trust') &&
      !contains(github.event.pull_request.labels.*.name, 'not ready') &&
      (contains(github.event.pull_request.labels.*.name, 'blog/engineering') ||
      contains(github.event.pull_request.labels.*.name, 'blog/marketing'))

    environment:
      name: cloudflare-dev-blog
      url: ${{ steps.extract.outputs.extracted_url }}

    permissions:
      contents: read

    steps:
      # TODO https://github.com/hanzoai/github-actions/issues/211
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for wrangler to work
          lfs: true
          ref: ${{ github.event.pull_request.head.sha }}

      # for Wrangler / Cloudflare Pages on pull_request_target
      - name: Name branch
        env:
          BRANCH: ${{ github.head_ref }} # see https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        run: git checkout -b $BRANCH

      # no ppremk/lfs-warning due to https://github.com/ppremk/lfs-warning/issues/150

      - name: Setup Go
        uses: hanzoai/github-actions/setup-go@main
        with:
          cache-key: website-preview

      - name: Install Task
        run: go generate -x
        working-directory: tools

      - name: Build tools
        run: bin/task env-pull

      - name: Build blog
        run: bin/task blog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for checkdocs

      - name: Check dirty
        run: |
          git status
          git diff --exit-code

      - name: Fetch CF credentials from KMS
        id: kms
        env:
          KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
          KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
        run: |
          # Auth: Universal Auth (preferred) or legacy API key
          if [ -n "${KMS_CLIENT_ID}" ] && [ -n "${KMS_CLIENT_SECRET}" ]; then
            HANZO_API_KEY=$(curl -sf "${KMS_ENDPOINT}/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${KMS_CLIENT_ID}\",\"clientSecret\":\"${KMS_CLIENT_SECRET}\"}" | jq -r '.accessToken')
          fi
          response=$(curl -sf "${KMS_ENDPOINT}/api/v3/secrets/raw?workspaceId=e1359bf4-31b4-4dfa-bb90-323e2c298ad8&secretPath=/deploy&environment=prod" \
            -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
          if [ -n "$response" ]; then
            cf_token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_API_TOKEN") | .secretValue // empty')
            cf_account=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="CLOUDFLARE_ACCOUNT_ID") | .secretValue // empty')
          fi
          if [ -z "${cf_token:-}" ]; then
            echo "::error::CF credentials not found in KMS."
            exit 1
          fi
          echo "::add-mask::${cf_token}"
          echo "::add-mask::${cf_account}"
          echo "cf_token=${cf_token}" >> "$GITHUB_OUTPUT"
          echo "cf_account=${cf_account}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        run: bin/task blog-cloudflare-preview | tee deploy.txt
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}

      - name: Set GitHub deployment URL
        id: extract
        uses: hanzoai/github-actions/extract-first-url@main

  docs-preview:
    name: Preview docs
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    if: >
      contains(github.event.pull_request.labels.*.name, 'trust') &&
      !contains(github.event.pull_request.labels.*.name, 'not ready') &&
      contains(github.event.pull_request.labels.*.name, 'documentation')

    environment:
      name: cloudflare-dev-docs
      url: ${{ steps.extract.outputs.extracted_url }}

    permissions:
      contents: read

    steps:
      # We can't easily download build results from the Docs workflow:
      # https://github.com/actions/download-artifact/issues/172
      # Just build them again instead.
      # That also allows us to pass branch name, commit hash, etc from git to wrangler.

      # TODO https://github.com/hanzoai/github-actions/issues/211
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for wrangler to work
          lfs: true
          ref: ${{ github.event.pull_request.head.sha }} # TODO https://github.com/hanzoai/github-actions/issues/211

      # for Wrangler / Cloudflare Pages on pull_request_target
      - name: Name branch
        env:
          BRANCH: ${{ github.head_ref }} # see https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        run: git checkout -b $BRANCH

      # no ppremk/lfs-warning due to https://github.com/ppremk/lfs-warning/issues/150

      - name: Setup Go
        uses: hanzoai/github-actions/setup-go@main
        with:
          cache-key: website-preview

      - name: Install Task
        run: go generate -x
        working-directory: tools

      - name: Build tools
        run: bin/task env-pull

      - name: Create directory
        run: mkdir -p tmp/githubcache

      - name: Build docs
        run: bin/task docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # for checkdocs

      - name: Check dirty
        run: |
          git status
          git diff --exit-code

      - name: Deploy to Cloudflare Pages
        run: bin/task docs-cloudflare-preview | tee deploy.txt
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ steps.kms.outputs.cf_token }}

      - name: Set GitHub deployment URL
        id: extract
        uses: hanzoai/github-actions/extract-first-url@main
